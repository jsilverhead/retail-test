services:
  sio_test:
    user: app
    build:
      context: .
      args:
        USER_ID: ${USER_ID:-1000}
    ports:
      - "8337:8337"
    volumes:
      - .:/app:rw
    env_file: .env.test

  postgres:
    container_name: ${COMPOSE_PROJECT_NAME}-postgres
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: retail
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --lc-collate=ru_RU.UTF-8 --lc-ctype=ru_RU.UTF-8
    ports:
      - target: 5432
        published: 5432
